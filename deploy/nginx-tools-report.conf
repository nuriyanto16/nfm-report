# Tambahkan blok berikut KE DALAM server { } existing untuk nfmtech.my.id
# (server block port 443 / TLS). JANGAN membuat server block baru.
#
#   sudo nano /etc/nginx/sites-available/nfmtech.my.id   (atau yang relevan)
#   sudo nginx -t && sudo systemctl reload nginx
#
# Port 8077 (API) & 3077 (web) = container yang di-bind ke 127.0.0.1.

# Redirect tanpa trailing slash -> dengan trailing slash.
location = /tools/report {
    return 301 /tools/report/;
}

# API backend (prefix /tools/report/api/ -> /api/ di FastAPI).
location /tools/report/api/ {
    proxy_pass http://127.0.0.1:8077/api/;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    client_max_body_size 10m;
}

# Frontend Nuxt (di-build dengan baseURL /tools/report/).
location /tools/report/ {
    proxy_pass http://127.0.0.1:3077;
    proxy_http_version 1.1;
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        "upgrade";
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}
